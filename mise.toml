[tools]
node = "24"

[tasks.install]
description = "Install npm dependencies"
run = "npm install"

[tasks.validate]
description = "Validate L10N markdown files against the versioned JSON Schema"
run = "npm run validate"

[tasks.dev]
description = "Run the Eleventy site locally"
run = "npm run dev"

[tasks.build]
description = "Build the Eleventy site"
run = "npm run build"
